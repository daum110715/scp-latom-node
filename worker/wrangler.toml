name = "scp-latom-node-api"
main = "src/index.ts"
compatibility_date = "2024-12-01"

[vars]
# JWT_SECRET is intentionally NOT defined here. A plaintext [vars] entry would be
# redeployed (and would clobber a same-named `wrangler secret put` value) on every
# `wrangler deploy`. Local dev reads it from .dev.vars (gitignored, see .dev.vars.example);
# production sets it via `wrangler secret put JWT_SECRET` — see SECURITY.md.
CORS_ORIGINS = "https://node.scp.lat,https://api.scp.lat,https://scp-docs.pages.dev,https://*.scp-docs.pages.dev,https://admin.scp.lat,https://admin.scp-docs.pages.dev,http://localhost:5173,http://localhost:8085,http://localhost:8086"

[[d1_databases]]
binding = "DB"
database_name = "scp-latom-node"
database_id = "85985e6c-c19e-43e3-9fc5-45754f2a215c"

# ─── Durable Objects ─────────────────────────────────────────

[durable_objects]
bindings = [
  { name = "SCP_EN_CRAWLER", class_name = "ScpCrawlerDo" },
  { name = "SCP_CN_CRAWLER", class_name = "ScpCrawlerDo" },
  { name = "AI_CHAT_DO", class_name = "AiChatDo" },
  { name = "AI_QUEUE_DO", class_name = "AiQueueDo" }
]

[[migrations]]
tag = "v1"
new_sqlite_classes = ["ScpCrawlerDo"]

[[migrations]]
tag = "v2"
new_sqlite_classes = ["AiChatDo"]

[[migrations]]
tag = "v3"
new_sqlite_classes = ["AiQueueDo"]
